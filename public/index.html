<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Meow Balls</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5412699736062085"
     crossorigin="anonymous"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

/* ══ CARTOON (default) ══════════════════════════════════════ */
:root{
  --bg1:#c9e8ff;--bg2:#a8d8ea;--bg3:#b5e88a;
  --panel:#FFFEF0;--outline:#1a1a2e;--outline-rgb:26,26,46;
  --c1:#FF6B9D;--c2:#FFB347;--c3:#56CCF2;--c4:#BB6BD9;
  --grass:#7ED957;--danger:#FF6B6B;
  --canvas1:#c9e8ff;--canvas2:#a8d8ea;--canvas3:#b5e88a;
  --hud-text:#1a1a2e;--muted:#999;
  --fn:'Fredoka One',cursive;--fb:'Nunito',sans-serif;
}

/* ══ NEON ════════════════════════════════════════════════════ */
[data-theme="neon"]{
  --bg1:#0a0015;--bg2:#0d001e;--bg3:#06000f;
  --panel:#150025;--outline:#cc00ff;--outline-rgb:204,0,255;
  --c1:#ff00aa;--c2:#ffcc00;--c3:#00ffee;--c4:#cc00ff;
  --grass:#00ff88;--danger:#ff0044;
  --canvas1:#0a0015;--canvas2:#0d001e;--canvas3:#06000f;
  --hud-text:#f0e0ff;--muted:#7755aa;
}
[data-theme="neon"] html,[data-theme="neon"] body{background:#0a0015;}
[data-theme="neon"] #login-screen,[data-theme="neon"] #bg{background:#0a0015;}
[data-theme="neon"] #login-box{border-color:#cc00ff;box-shadow:0 0 0 4px #0a0015,0 0 40px #cc00ff66;background:#150025;}
[data-theme="neon"] #login-box h1,[data-theme="neon"] #login-box p{color:#f0e0ff;}
[data-theme="neon"] #login-box>p:last-of-type{color:#7755aa;}
[data-theme="neon"] #login-err{color:#ff0044;}
[data-theme="neon"] #login-btn{background:#ff00aa;border-color:#ff00aa;box-shadow:4px 4px 0 #cc00ff,0 0 20px #ff00aa55;}
[data-theme="neon"] .mi{background:#0d001e;border-color:#cc00ff44;color:#f0e0ff;}
[data-theme="neon"] #leaderboard .lb-row{background:#1a003a;border-color:#330055;}
[data-theme="neon"] #leaderboard .lb-name{color:#f0e0ff;}
[data-theme="neon"] #leaderboard .lb-score{color:#00ffee;}
[data-theme="neon"] #leaderboard .lb-title{color:#7755aa;}
[data-theme="neon"] .hbox{background:#150025;border-color:#cc00ff;box-shadow:3px 3px 0 #cc00ff55;}
[data-theme="neon"] .hnum{color:#00ffee;text-shadow:0 0 10px #00ffeeaa;}
[data-theme="neon"] .hlbl{color:#7755aa;}
[data-theme="neon"] #gc{border-color:#cc00ff;box-shadow:0 0 30px #cc00ff44;}
[data-theme="neon"] .mtitle{color:#00ffee;border-bottom-color:#330044;}
[data-theme="neon"] .msec>div[style*="f8f4ff"]{background:#1a0030!important;border-color:#330044!important;}
[data-theme="neon"] #mod-panel{background:#150025;border-color:#cc00ff;}
[data-theme="neon"] #mob-sheet{background:#150025;border-color:#cc00ff;}
[data-theme="neon"] #over{background:rgba(10,0,21,.94);}
[data-theme="neon"] #over h2{color:#ff00aa;text-shadow:0 0 30px #ff00aa;}
[data-theme="neon"] .cloud{display:none;}
[data-theme="neon"] .drag-pill{background:#330044;}
[data-theme="neon"] .login-divider{border-top-color:#330044;}

/* ══ SUNSET ══════════════════════════════════════════════════ */
[data-theme="sunset"]{
  --bg1:#ff7e5f;--bg2:#d6437a;--bg3:#2c1654;
  --panel:#fff0e8;--outline:#2c1654;--outline-rgb:44,22,84;
  --c1:#ff4e6a;--c2:#ffb347;--c3:#ff7043;--c4:#ce93d8;
  --grass:#e040fb;--danger:#ff1744;
  --canvas1:#ff7e5f;--canvas2:#d6437a;--canvas3:#2c1654;
  --hud-text:#2c1654;--muted:#a0778b;
}
[data-theme="sunset"] html,[data-theme="sunset"] body{background:linear-gradient(180deg,#ff7e5f,#d6437a 50%,#2c1654);}
[data-theme="sunset"] #login-screen,[data-theme="sunset"] #bg{background:linear-gradient(180deg,#ff7e5f,#d6437a 50%,#2c1654);}
[data-theme="sunset"] .cloud{background:rgba(255,180,140,.55);}
[data-theme="sunset"] .cpuff{background:rgba(255,180,140,.55);}
[data-theme="sunset"] #leaderboard .lb-row{background:#f3e0ff;border-color:#d4b0ee;}
[data-theme="sunset"] #over{background:rgba(44,22,84,.92);}

/* ══ CANDY ═══════════════════════════════════════════════════ */
[data-theme="candy"]{
  --bg1:#ffe0f0;--bg2:#ffd6e8;--bg3:#e8d0ff;
  --panel:#fff8ff;--outline:#cc44aa;--outline-rgb:204,68,170;
  --c1:#ff66bb;--c2:#ffaa33;--c3:#aa66ff;--c4:#ff44cc;
  --grass:#44ddaa;--danger:#ff2266;
  --canvas1:#ffe0f0;--canvas2:#ffd6e8;--canvas3:#e8d0ff;
  --hud-text:#880055;--muted:#cc88bb;
}
[data-theme="candy"] html,[data-theme="candy"] body{background:linear-gradient(180deg,#ffe0f0,#ffd6e8 55%,#e8d0ff);}
[data-theme="candy"] #login-screen,[data-theme="candy"] #bg{background:linear-gradient(180deg,#ffe0f0,#ffd6e8 55%,#e8d0ff);}
[data-theme="candy"] .hnum{color:#880055;}
[data-theme="candy"] .hlbl{color:#cc88bb;}
[data-theme="candy"] .cloud,.cpuff{background:rgba(255,255,255,.9);}
[data-theme="candy"] #leaderboard .lb-row{background:#ffe8f8;border-color:#f0b0d8;}
[data-theme="candy"] #over{background:rgba(80,0,60,.9);}

html,body{
  width:100%;height:100%;overflow:hidden;font-family:var(--fb);
  background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 100%);
}

/* ── login screen ────────────────────────────────────────── */
#login-screen{
  position:fixed;inset:0;z-index:500;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 100%);
}
#login-box{
  background:var(--panel);border:4px solid var(--outline);
  border-radius:24px;box-shadow:6px 6px 0 var(--outline);
  padding:32px 28px;width:min(320px,92vw);display:flex;flex-direction:column;gap:12px;
  text-align:center;
}
#login-box h1{font-family:var(--fn);font-size:28px;color:var(--outline);}
#login-box p{font-size:13px;color:var(--muted);margin-top:-4px;}
#login-err{font-size:12px;color:var(--danger);font-weight:700;min-height:16px;}
#login-btn{
  font-family:var(--fn);font-size:18px;cursor:pointer;
  background:var(--c1);color:#fff;
  border:3px solid var(--outline);border-radius:14px;
  box-shadow:4px 4px 0 var(--outline);padding:10px;
  transition:transform .1s,box-shadow .1s;
}
#login-btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--outline);}
.login-divider{border:none;border-top:1px dashed rgba(var(--outline-rgb),.2);margin:2px 0;}
#leaderboard{display:flex;flex-direction:column;gap:5px;text-align:left;}
#leaderboard .lb-title{font-family:var(--fn);font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;text-align:center;}
#leaderboard .lb-row{
  display:flex;align-items:center;gap:8px;
  background:#f5f0ff;border:2px solid #e0d5f5;border-radius:10px;padding:6px 10px;
}
#leaderboard .lb-rank{font-family:var(--fn);font-size:16px;width:22px;text-align:center;flex-shrink:0;}
#leaderboard .lb-name{font-family:var(--fn);font-size:13px;color:var(--outline);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#leaderboard .lb-score{font-family:var(--fn);font-size:13px;color:var(--c4);}
#leaderboard .lb-empty{font-size:12px;color:#bbb;text-align:center;padding:4px 0;}

#bg{position:fixed;inset:0;z-index:0;
  background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 100%);
  overflow:hidden;pointer-events:none;}
.cloud{position:absolute;background:rgba(255,255,255,.75);border-radius:60px;animation:drift linear infinite;}
.cpuff{position:absolute;background:rgba(255,255,255,.75);border-radius:50%;}
@keyframes drift{from{transform:translateX(-350px)}to{transform:translateX(110vw)}}

/* ── root layout ─────────────────────────────────────────── */
#app{
  position:relative;z-index:1;
  display:flex;align-items:flex-start;justify-content:center;
  width:100%;height:100vh;
  padding:6px;gap:8px;
}

/* ── game column ─────────────────────────────────────────── */
#game-col{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;}

/* ── HUD ─────────────────────────────────────────────────── */
#hud{display:flex;align-items:center;justify-content:space-between;width:100%;gap:5px;}
.hbox{
  background:var(--panel);border:3px solid var(--outline);
  border-radius:14px;box-shadow:3px 3px 0 var(--outline);
  padding:4px 12px;text-align:center;flex:1;
}
.hlbl{font-family:var(--fn);font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.hnum{font-family:var(--fn);font-size:20px;color:var(--hud-text);line-height:1.1;}
#next-box{display:flex;flex-direction:column;align-items:center;padding:3px 8px;flex:1;}
#nextCv{display:block;}

/* ── THEME SWITCHER ──────────────────────────────────────── */
#theme-row{
  display:flex;align-items:center;gap:5px;
  width:100%;
}
.theme-pill{
  flex:1;font-family:var(--fn);font-size:11px;cursor:pointer;
  background:var(--panel);color:var(--outline);
  border:2px solid rgba(var(--outline-rgb),.3);border-radius:20px;
  padding:4px 2px;text-align:center;
  transition:transform .1s,background .15s,border-color .15s,box-shadow .15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.theme-pill:active{transform:scale(.93);}
.theme-pill.active{
  background:var(--outline);color:var(--panel);
  border-color:var(--outline);
  box-shadow:2px 2px 0 rgba(var(--outline-rgb),.35);
}
[data-theme="neon"] .theme-pill{background:#150025;color:#f0e0ff;border-color:#cc00ff44;}
[data-theme="neon"] .theme-pill.active{background:#cc00ff;color:#fff;border-color:#cc00ff;box-shadow:2px 2px 0 #88006688,0 0 10px #cc00ff55;}
[data-theme="sunset"] .theme-pill{background:rgba(255,255,255,.15);color:#2c1654;border-color:rgba(44,22,84,.25);}
[data-theme="sunset"] .theme-pill.active{background:#2c1654;color:#fff0e8;border-color:#2c1654;}
[data-theme="candy"] .theme-pill{border-color:rgba(204,68,170,.25);}
[data-theme="candy"] .theme-pill.active{background:#cc44aa;color:#fff;border-color:#cc44aa;}

/* ── canvas wrap ─────────────────────────────────────────── */
#cv-wrap{position:relative;line-height:0;flex-shrink:0;}
#gc{
  display:block;cursor:crosshair;touch-action:none;
  border:4px solid var(--outline);border-radius:20px;
  box-shadow:6px 6px 0 var(--outline);
}

/* ── game-over overlay ───────────────────────────────────── */
#over{
  position:absolute;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(45,27,105,.88);border-radius:16px;
  backdrop-filter:blur(6px);z-index:50;
}
#over h2{font-family:var(--fn);font-size:42px;color:var(--c2);text-shadow:3px 3px 0 var(--outline);}
#over-sc{font-family:var(--fn);font-size:20px;color:#fff;}
#re-btn{
  font-family:var(--fn);font-size:18px;cursor:pointer;
  background:var(--grass);color:var(--outline);
  border:3px solid var(--outline);border-radius:16px;
  box-shadow:4px 4px 0 var(--outline);padding:10px 28px;
  transition:transform .1s,box-shadow .1s;
}
#re-btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--outline);}

/* ── desktop mod panel ───────────────────────────────────── */
#mod-panel{
  background:var(--panel);border:3px solid var(--outline);
  border-radius:22px;box-shadow:5px 5px 0 var(--outline);
  padding:14px 12px;width:216px;flex-shrink:0;
  max-height:calc(100vh - 16px);overflow-y:auto;
  display:flex;flex-direction:column;gap:10px;
  align-self:flex-start;margin-top:0;
}
#mod-panel::-webkit-scrollbar{width:4px;}
#mod-panel::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px;}

/* ── shared mod UI ───────────────────────────────────────── */
.mtitle{font-family:var(--fn);font-size:15px;color:var(--outline);border-bottom:2px dashed #ddd;padding-bottom:6px;}
.msec{display:flex;flex-direction:column;gap:6px;}
.mi{width:100%;border:2px solid var(--outline);border-radius:10px;
  padding:7px 10px;font-family:var(--fb);font-size:13px;font-weight:700;
  background:#fff;outline:none;}
.mi:focus{border-color:var(--c3);}
.mbtn{font-family:var(--fn);font-size:14px;width:100%;
  border:2.5px solid var(--outline);border-radius:10px;
  box-shadow:3px 3px 0 var(--outline);padding:7px 10px;
  cursor:pointer;transition:transform .1s,box-shadow .1s;}
.mbtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--outline);}
.bblue{background:var(--c3);color:var(--outline);}
.bred {background:#ff6b6b;color:#fff;}
.bpink{background:var(--c1);color:#fff;}
.bgreen{background:var(--grass);color:var(--outline);}
.tbtn{font-family:var(--fn);font-size:11px;background:var(--c2);color:var(--outline);
  border:2px solid var(--outline);border-radius:8px;box-shadow:2px 2px 0 var(--outline);
  padding:4px 9px;cursor:pointer;margin:2px;transition:transform .1s;}
.tbtn:active{transform:translate(1px,1px);box-shadow:0 0;}

/* ── mobile gear button ──────────────────────────────────── */
#mob-btn{
  display:none;position:fixed;top:10px;right:10px;z-index:400;
  background:none;border:none;padding:6px;cursor:pointer;
  font-size:26px;line-height:1;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.4));
  opacity:.9;transition:opacity .15s,transform .15s;
}
#mob-btn:active{opacity:.5;transform:scale(.88);}

/* ── mobile bottom sheet ─────────────────────────────────── */
#mob-bg{
  display:none;position:fixed;inset:0;z-index:350;
  background:rgba(45,27,105,.55);backdrop-filter:blur(4px);
  align-items:flex-end;
}
#mob-bg.open{display:flex;}
#mob-sheet{
  background:var(--panel);border:3px solid var(--outline);
  border-radius:22px 22px 0 0;box-shadow:0 -4px 0 var(--outline);
  padding:14px 14px 36px;width:100%;max-height:75vh;overflow-y:auto;
  display:flex;flex-direction:column;gap:10px;
}
.drag-pill{width:40px;height:5px;background:#ccc;border-radius:3px;margin:0 auto 6px;}

/* ── floating score pop ──────────────────────────────────── */
#pop{position:fixed;pointer-events:none;font-family:var(--fn);font-size:26px;
  color:#fff;text-shadow:3px 3px 0 var(--outline);z-index:300;opacity:0;}
@keyframes popUp{
  0%  {opacity:1;transform:scale(.6) translateY(0);}
  45% {opacity:1;transform:scale(1.3) translateY(-20px);}
  100%{opacity:0;transform:scale(1)   translateY(-54px);}
}
.popping{animation:popUp .7s cubic-bezier(.17,.67,.41,1.5) forwards;}

/* ── responsive ──────────────────────────────────────────── */
@media(max-width:700px){
  #mod-panel{display:none;}
  #mob-btn{display:block;}
  .hbox{padding:3px 8px;}
  .hnum{font-size:18px;}
  .theme-pill{font-size:10px;padding:4px 1px;}
}
</style>
</head>
<body>
<div id="login-screen">
  <div id="login-box">
    <h1>Meow Balls</h1>
    <p>Enter your TikTok username</p>
    <p>Gifts will send Help</p>
    <input class="mi" id="login-user" type="text" placeholder="@yourusername"
      style="font-size:16px;padding:10px 14px;text-align:center;"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div id="login-err"></div>
    <button id="login-btn" onclick="doLogin()">Play</button>
    <hr class="login-divider">
    <div id="leaderboard"><div class="lb-empty">Loading scores…</div></div>
  </div>
</div>

<div id="bg"></div>
<div id="pop"></div>
<button id="mob-btn" aria-label="Mod tools" onclick="openSheet()">⚙️</button>
<div id="mob-bg" onclick="closeBg(event)">
  <div id="mob-sheet">
    <div class="drag-pill"></div>
    <div id="mob-mod"></div>
  </div>
</div>

<div id="app">
  <div id="game-col">
    <div id="hud">
      <div class="hbox"><div class="hlbl">Score</div><div class="hnum" id="sv">0</div></div>
      <div class="hbox" id="next-box"><div class="hlbl">Next</div><canvas id="nextCv" width="52" height="52"></canvas></div>
      <div class="hbox"><div class="hlbl">Best</div><div class="hnum" id="bv">0</div></div>
    </div>

    <!-- ── Theme switcher row ── -->
    <div id="theme-row">
      <button class="theme-pill active" data-theme-btn="cartoon"  onclick="applyTheme('cartoon',true)">Cartoon</button>
      <button class="theme-pill"        data-theme-btn="neon"     onclick="applyTheme('neon',true)">Neon</button>
      <button class="theme-pill"        data-theme-btn="sunset"   onclick="applyTheme('sunset',true)">Sunset</button>
      <button class="theme-pill"        data-theme-btn="candy"    onclick="applyTheme('candy',true)">Candy</button>
    </div>

    <div id="cv-wrap">
      <canvas id="gc"></canvas>
      <div id="over">
        <h2>GAME OVER!</h2>
        <div id="over-sc">Score: 0</div>
        <button id="re-btn" onclick="restart()">Play Again</button>
      </div>
    </div>
  </div>
  <div id="mod-panel">
    <div id="desk-mod"></div>
  </div>
</div>

<script>
'use strict';

/* ══ BALL PALETTES ══════════════════════════════════════════ */
const BC_CARTOON=[
  {r:16,color:'#FF6B9D',ol:'#C94E7A'},{r:24,color:'#FFB347',ol:'#C97A1A'},
  {r:32,color:'#56CCF2',ol:'#2A8CB0'},{r:40,color:'#6FCF97',ol:'#288A50'},
  {r:50,color:'#BB6BD9',ol:'#7B3A99'},{r:62,color:'#F2994A',ol:'#B86020'},
  {r:76,color:'#60a5fa',ol:'#2563CC'},{r:92,color:'#F2C94C',ol:'#C4961A'},
  {r:108,color:'#EB5757',ol:'#A82222'},{r:125,color:'#27AE60',ol:'#155A30'},
];
const BC_NEON=[
  {r:16,color:'#ff00aa',ol:'#cc0077'},{r:24,color:'#ffcc00',ol:'#aa8800'},
  {r:32,color:'#00ffee',ol:'#009988'},{r:40,color:'#00ff88',ol:'#009944'},
  {r:50,color:'#cc00ff',ol:'#880099'},{r:62,color:'#ff4400',ol:'#bb2200'},
  {r:76,color:'#0088ff',ol:'#0044aa'},{r:92,color:'#ff0044',ol:'#bb0022'},
  {r:108,color:'#44ffaa',ol:'#009955'},{r:125,color:'#ff88ff',ol:'#aa00aa'},
];
const BC_SUNSET=[
  {r:16,color:'#ffb347',ol:'#cc7700'},{r:24,color:'#ff7e5f',ol:'#cc3322'},
  {r:32,color:'#ff4e6a',ol:'#cc1133'},{r:40,color:'#e040fb',ol:'#9900bb'},
  {r:50,color:'#ce93d8',ol:'#8800aa'},{r:62,color:'#ff8a65',ol:'#cc4411'},
  {r:76,color:'#f48fb1',ol:'#cc2266'},{r:92,color:'#ffcc02',ol:'#cc8800'},
  {r:108,color:'#ef5350',ol:'#aa1111'},{r:125,color:'#ab47bc',ol:'#660077'},
];
const BC_CANDY=[
  {r:16,color:'#ff66bb',ol:'#cc1188'},{r:24,color:'#ffaa33',ol:'#cc6600'},
  {r:32,color:'#aa66ff',ol:'#6600cc'},{r:40,color:'#44ddaa',ol:'#009966'},
  {r:50,color:'#ff44cc',ol:'#bb0088'},{r:62,color:'#66bbff',ol:'#0066cc'},
  {r:76,color:'#ffdd44',ol:'#cc9900'},{r:92,color:'#ff8866',ol:'#cc3311'},
  {r:108,color:'#88ddff',ol:'#0088cc'},{r:125,color:'#dd88ff',ol:'#8800cc'},
];
// mutable — swapped by applyTheme
const BC=BC_CARTOON.map(b=>({...b}));
const CW=420,CH=660,DANGER=110,DROPY=55;

/* ══ AUDIO ══════════════════════════════════════════════════ */
const AudioCtx=window.AudioContext||window.webkitAudioContext;
const actx=new AudioCtx();
const mGain=actx.createGain(); mGain.gain.value=0.5; mGain.connect(actx.destination);
function wakeAudio(){if(actx.state==='suspended')actx.resume();}
document.addEventListener('pointerdown',wakeAudio,{once:true});
function noise(dur){
  const n=Math.ceil(actx.sampleRate*dur),buf=actx.createBuffer(1,n,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,1.3);
  return buf;
}
function osc(type,freq,gainVal,dur,startDelay=0){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(gainVal,actx.currentTime+startDelay);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+startDelay+dur);
  o.connect(g);g.connect(mGain);
  o.start(actx.currentTime+startDelay);o.stop(actx.currentTime+startDelay+dur+0.01);
}
const sfx={
  drop(){
    wakeAudio();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(480,actx.currentTime);
    o.frequency.exponentialRampToValueAtTime(160,actx.currentTime+0.11);
    g.gain.setValueAtTime(0.25,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.13);
    o.connect(g);g.connect(mGain);
    o.start();o.stop(actx.currentTime+0.14);
  },
  merge(lvl){
    wakeAudio();
    const freqs=[523,587,659,784,880,1047,1175,1319,1568,1760];
    const f=freqs[Math.min(lvl-1,9)];
    const dur=lvl>=6?0.5:0.28;
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(f*0.8,actx.currentTime);
    o.frequency.exponentialRampToValueAtTime(f,actx.currentTime+0.05);
    g.gain.setValueAtTime(0,actx.currentTime);
    g.gain.linearRampToValueAtTime(0.45,actx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
    o.connect(g);g.connect(mGain);o.start();o.stop(actx.currentTime+dur);
    if(lvl>=4){osc('triangle',f*1.5,0.18,dur-0.05,0.03);}
    if(lvl>=7){osc('sine',f*3,0.1,0.2,0.06);}
  },
  spikeSpawn(){
    wakeAudio();
    const o=actx.createOscillator(),f=actx.createBiquadFilter(),g=actx.createGain();
    o.type='sawtooth';f.type='highpass';f.frequency.value=800;
    o.frequency.setValueAtTime(650,actx.currentTime);
    o.frequency.exponentialRampToValueAtTime(160,actx.currentTime+0.2);
    g.gain.setValueAtTime(0.22,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.2);
    o.connect(f);f.connect(g);g.connect(mGain);
    o.start();o.stop(actx.currentTime+0.22);
  },
  spikeHit(){
    wakeAudio();
    const src=actx.createBufferSource(),fil=actx.createBiquadFilter(),gn=actx.createGain();
    src.buffer=noise(0.22);fil.type='bandpass';fil.frequency.value=350;fil.Q.value=0.7;
    gn.gain.setValueAtTime(0.65,actx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.22);
    src.connect(fil);fil.connect(gn);gn.connect(mGain);
    src.start();src.stop(actx.currentTime+0.24);
    osc('sine',90,0.4,0.16);
  },
  gameOver(){
    wakeAudio();
    [[392,0],[330,0.22],[262,0.44],[196,0.68]].forEach(([freq,d])=>{
      const o=actx.createOscillator(),g=actx.createGain();
      o.type='triangle';o.frequency.value=freq;
      const t=actx.currentTime+d;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.35,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      o.connect(g);g.connect(mGain);o.start(t);o.stop(t+0.37);
    });
  },
  clear(){
    wakeAudio();
    osc('sine',200,0.28,0.25);
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(200,actx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1600,actx.currentTime+0.28);
    g.gain.setValueAtTime(0.22,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.28);
    o.connect(g);g.connect(mGain);o.start();o.stop(actx.currentTime+0.3);
  },
};

/* ══ THEME ═══════════════════════════════════════════════════ */
function applyTheme(t, save){
  document.documentElement.setAttribute('data-theme', t==='cartoon'?'':t);
  if(save) localStorage.setItem('mb_theme', t);
  // Update pill active state
  document.querySelectorAll('[data-theme-btn]').forEach(btn=>{
    btn.classList.toggle('active', btn.getAttribute('data-theme-btn')===t);
  });
  // Swap ball colors
  const src=t==='neon'?BC_NEON:t==='sunset'?BC_SUNSET:t==='candy'?BC_CANDY:BC_CARTOON;
  BC.forEach((b,i)=>{ b.color=src[i].color; b.ol=src[i].ol; });
  // Redraw next preview if game is running
  if(typeof drawNext==='function') try{ drawNext(); }catch(_){}
}
// Apply saved theme on boot — guard against old 'noir' value
(function(){
  const saved=localStorage.getItem('mb_theme')||'cartoon';
  applyTheme(['cartoon','neon','sunset','candy'].includes(saved)?saved:'cartoon', false);
})();

/* ══ AUTH ════════════════════════════════════════════════════ */
let authToken    = sessionStorage.getItem('mb_token') || '';
let authInstance = sessionStorage.getItem('mb_inst')  || '';
function api(url, opts={}){
  opts.headers = { 'Content-Type':'application/json', 'x-token': authToken, ...(opts.headers||{}) };
  return fetch(url, opts);
}
async function doLogin(){
  const u = (document.getElementById('login-user')?.value||'').trim();
  if(!u){ document.getElementById('login-err').textContent='Enter your TikTok username'; return; }
  const btn=document.getElementById('login-btn');
  btn.textContent='Connecting…'; btn.disabled=true;
  const r = await fetch('/api/login',{ method:'POST',
    headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u}) }).catch(()=>null);
  btn.disabled=false; btn.textContent='Play';
  if(!r){ document.getElementById('login-err').textContent='Server error'; return; }
  const d = await r.json();
  if(!d.success){ document.getElementById('login-err').textContent=d.error||'Error'; return; }
  authToken=d.token; authInstance=d.instanceId;
  sessionStorage.setItem('mb_token',authToken);
  sessionStorage.setItem('mb_inst',authInstance);
  document.getElementById('login-screen').style.display='none';
  startGame();
}
function logout(){
  sessionStorage.removeItem('mb_token'); sessionStorage.removeItem('mb_inst');
  location.reload();
}

const MEDALS=['🥇','🥈','🥉'];
function renderLeaderboard(rows){

  if(!el)return;

}
function loadLeaderboard(){
  fetch('/api/leaderboard').then(r=>r.json()).then(d=>renderLeaderboard(d.top)).catch(()=>{
    const el=document.getElementById('leaderboard');
    if(el) el.innerHTML='<div class="lb-empty">—</div>';
  });
}
function submitScore(s){
  if(!authToken||!s)return;
  fetch('/api/score',{method:'POST',headers:{'Content-Type':'application/json','x-token':authToken},
    body:JSON.stringify({score:s})}).catch(()=>{});
}

/* ══ STATE ══════════════════════════════════════════════════ */
let score=0, hi=+localStorage.getItem('mb_hi')||0;
let nxt=rndN(), mx=CW/2, gameOver=false, locked=false;
let parts=[], merges=[], mergeIds=new Set();
let clientStore={};
let shk=0;

/* ══ PHYSICS ════════════════════════════════════════════════ */
const {Engine,World,Bodies,Events,Composite}=Matter;
let eng,wd;
function initPhy(){
  eng=Engine.create({gravity:{y:1.5}});wd=eng.world;
  const w={isStatic:true,friction:.5,restitution:.18,label:'wall'};
  World.add(wd,[
    Bodies.rectangle(CW/2,CH+12,CW*2,24,w),
    Bodies.rectangle(-12,CH/2,24,CH*2,w),
    Bodies.rectangle(CW+12,CH/2,24,CH*2,w),
  ]);
  Events.on(eng,'collisionStart',onCol);
}
function onCol(e){
  for(const {bodyA:A,bodyB:B} of e.pairs){
    if((A.label==='spike'&&B.label==='ball')||(B.label==='spike'&&A.label==='ball')){
      const ball=A.label==='ball'?A:B,sp=A.label==='spike'?A:B;
      burst(ball.position.x,ball.position.y,BC[ball.bL-1].color,16);
      World.remove(wd,[ball,sp]);shk=7;sfx.spikeHit();continue;
    }
    if(A.label==='ball'&&B.label==='ball'&&A.bL===B.bL&&A.bL<10
       &&!mergeIds.has(A.id)&&!mergeIds.has(B.id)){
      mergeIds.add(A.id);mergeIds.add(B.id);merges.push([A,B]);
    }
  }
}
function doMerges(){
  if(!merges.length)return;
  const q=merges.splice(0),all=Composite.allBodies(wd);
  for(const [A,B] of q){
    if(!all.includes(A)||!all.includes(B)){mergeIds.delete(A?.id);mergeIds.delete(B?.id);continue;}
    const lvl=A.bL;
    const px=(A.position.x+B.position.x)/2,py=(A.position.y+B.position.y)/2;
    World.remove(wd,[A,B]);mergeIds.delete(A.id);mergeIds.delete(B.id);
    burst(px,py,BC[lvl-1].color,20);
    spawnBall(px,py,lvl+1,false);
    const pts=lvl*10;addScore(pts);showPop(px,py,'+'+pts);
    sfx.merge(lvl);if(lvl>=6)shk=6;
  }
}

/* ══ SPAWN ══════════════════════════════════════════════════ */
function spawnBall(x,y,lvl,manual=true){
  if(lvl>10)return;
  const b=Bodies.circle(x,y,BC[lvl-1].r,{label:'ball',restitution:.25,friction:.4,frictionAir:.008,density:.002});
  b.bL=lvl;b.spawnTime=Date.now();World.add(wd,b);
  if(manual){nxt=rndN();drawNext();}
}
function rndN(){const r=Math.random();return r<.60?1:r<.88?2:3;}
function dropBall(){
  if(gameOver||locked)return;
  const x=clamp(mx,24+BC[nxt-1].r,CW-24-BC[nxt-1].r);
  spawnBall(x,DROPY,nxt,true);sfx.drop();locked=true;setTimeout(()=>locked=false,400);
}

/* ══ SCORE ══════════════════════════════════════════════════ */
function addScore(p){
  score+=p;
  if(score>hi){
    hi=score;
    localStorage.setItem('mb_hi',hi);
  }
  document.getElementById('sv').textContent=score.toLocaleString();
  document.getElementById('bv').textContent=hi.toLocaleString();
}

/* ══ PARTICLES ══════════════════════════════════════════════ */
function burst(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2*i/n)+Math.random()*.5,s=2.5+Math.random()*5;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*4,col,life:1});
  }
}
function stepParts(){
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.vx*=.95;p.vy*=.95;p.life-=.025;}
  parts=parts.filter(p=>p.life>0);
}

/* ══ CANVAS + RENDER ════════════════════════════════════════ */
const cv=document.getElementById('gc'),ctx=cv.getContext('2d');
const ncv=document.getElementById('nextCv'),nctx=ncv.getContext('2d');

function sizeCanvas(){
  const mob=window.innerWidth<=700;
  const hudEl=document.getElementById('hud');
  const themeRow=document.getElementById('theme-row');
  const hudH=(hudEl.getBoundingClientRect().height||60)+(themeRow.getBoundingClientRect().height||28)+10;
  const sidePanelW=mob?0:232;
  const pad=18;
  const availW=window.innerWidth-sidePanelW-20;
  const availH=window.innerHeight-hudH-pad;
  const sc=Math.min(1,availW/CW,availH/CH);
  cv.width=CW;cv.height=CH;
  cv.style.width=Math.floor(CW*sc)+'px';
  cv.style.height=Math.floor(CH*sc)+'px';
}

function render(){
  ctx.clearRect(0,0,CW,CH);
  const style=getComputedStyle(document.documentElement);
  const c1=style.getPropertyValue('--canvas1').trim();
  const c2=style.getPropertyValue('--canvas2').trim();
  const c3=style.getPropertyValue('--canvas3').trim();
  const bg=ctx.createLinearGradient(0,0,0,CH);
  bg.addColorStop(0,c1||'#c9e8ff');bg.addColorStop(.55,c2||'#a8d8ea');bg.addColorStop(1,c3||'#b5e88a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,CW,CH);

  const theme=document.documentElement.getAttribute('data-theme')||'cartoon';
  if(theme==='neon'){
    // glowing stars
    ctx.save();
    const starCols=['#ff00aa','#00ffee','#cc00ff','#ffcc00','#0088ff'];
    for(let i=0;i<55;i++){
      const sx=((i*137+77)%CW),sy=((i*97+31)%(CH*.85));
      ctx.fillStyle=starCols[i%starCols.length];
      ctx.shadowColor=starCols[i%starCols.length];ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(sx,sy,i%5===0?1.5:.7,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  } else if(theme==='sunset'){
    const hg=ctx.createRadialGradient(CW/2,CH,10,CW/2,CH*.7,CW*.8);
    hg.addColorStop(0,'rgba(255,200,80,.18)');hg.addColorStop(1,'rgba(255,100,50,0)');
    ctx.fillStyle=hg;ctx.fillRect(0,0,CW,CH);
  } else {
    ctx.fillStyle='rgba(255,255,255,0.08)';
    for(let x=20;x<CW;x+=40)for(let y=20;y<CH;y+=40){ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();}
  }

  const dangerColor=style.getPropertyValue('--danger').trim()||'#FF6B6B';
  const dg=ctx.createLinearGradient(0,0,0,DANGER+30);
  dg.addColorStop(0,dangerColor+'33');dg.addColorStop(1,dangerColor+'00');
  ctx.fillStyle=dg;ctx.fillRect(0,0,CW,DANGER+30);
  ctx.save();ctx.strokeStyle=dangerColor;ctx.lineWidth=2.5;ctx.setLineDash([10,7]);
  ctx.beginPath();ctx.moveTo(0,DANGER);ctx.lineTo(CW,DANGER);ctx.stroke();
  ctx.setLineDash([]);
  ctx.font='bold 11px Nunito';ctx.fillStyle=dangerColor;ctx.fillText('⚠ DANGER',9,DANGER-6);
  ctx.restore();

  if(!gameOver&&!locked){
    const r=BC[nxt-1].r,gx=clamp(mx,24+r,CW-24-r);
    ctx.save();ctx.strokeStyle=BC[nxt-1].color+'44';ctx.lineWidth=1.5;ctx.setLineDash([5,7]);
    ctx.beginPath();ctx.moveTo(gx,DROPY+r);ctx.lineTo(gx,CH-10);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
    drawBall(ctx,gx,DROPY,nxt,.28,0);
  }
  for(const p of parts){
    ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.col;
    ctx.shadowBlur=6;ctx.shadowColor=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  for(const b of Composite.allBodies(wd)){
    if(b.isStatic)continue;
    if(b.label==='ball')drawBall(ctx,b.position.x,b.position.y,b.bL,1,b.angle);
    if(b.label==='spike')drawSpike(ctx,b.position.x,b.position.y,20,b.angle);
  }
}

function drawBall(c,x,y,lvl,alpha,angle){
  const cfg=BC[lvl-1],r=cfg.r;
  const isNeon=document.documentElement.getAttribute('data-theme')==='neon';
  c.save();c.globalAlpha=alpha;c.translate(x,y);c.rotate(angle);
  if(isNeon){
    c.save();c.beginPath();c.arc(0,0,r+3,0,Math.PI*2);
    c.shadowColor=cfg.color;c.shadowBlur=22;c.strokeStyle=cfg.color+'55';c.lineWidth=3;c.stroke();c.restore();
  } else {
    c.save();c.shadowColor='rgba(0,0,0,.18)';c.shadowBlur=8;c.shadowOffsetY=4;
    c.beginPath();c.arc(0,4,r,0,Math.PI*2);c.fillStyle='rgba(0,0,0,.1)';c.fill();c.restore();
  }
  c.beginPath();c.arc(0,0,r,0,Math.PI*2);
  if(cfg.skin){
    c.save();c.clip();c.drawImage(cfg.skin,-r,-r,r*2,r*2);c.restore();
  } else {
    const g=c.createRadialGradient(-r*.3,-r*.35,r*.05,0,0,r);
    g.addColorStop(0,ltn(cfg.color,42));g.addColorStop(1,cfg.color);
    c.fillStyle=g;c.fill();
  }
  if(!cfg.skin){
    c.save();c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.clip();
    c.strokeStyle=cfg.ol;c.lineWidth=5;c.stroke();c.restore();
  }
  c.save();c.beginPath();
  c.ellipse(-r*.27,-r*.27,r*.25,r*.16,-Math.PI/5,0,Math.PI*2);
  c.fillStyle='rgba(255,255,255,.5)';c.fill();c.restore();
  c.restore();
}

function drawSpike(c,x,y,r,angle){
  c.save();c.translate(x,y);c.rotate(angle);
  c.beginPath();
  for(let i=0;i<16;i++){
    const rad=i%2===0?r:r/2,a=(i/8)*Math.PI;
    c[i===0?'moveTo':'lineTo'](Math.cos(a)*rad,Math.sin(a)*rad);
  }
  c.closePath();
  const g=c.createRadialGradient(-2,-2,2,0,0,r);
  g.addColorStop(0,'#f87171');g.addColorStop(1,'#991b1b');
  c.fillStyle=g;c.fill();c.strokeStyle='#7f1d1d';c.lineWidth=2;c.stroke();
  c.fillStyle='rgba(255,255,255,.28)';c.beginPath();c.arc(-r*.2,-r*.24,r*.2,0,Math.PI*2);c.fill();
  c.restore();
}

function drawNext(){
  nctx.clearRect(0,0,52,52);
  const style=getComputedStyle(document.documentElement);
  const g=nctx.createLinearGradient(0,0,0,52);
  g.addColorStop(0,style.getPropertyValue('--canvas1').trim()||'#c9e8ff');
  g.addColorStop(1,style.getPropertyValue('--canvas2').trim()||'#a8d8ea');
  nctx.fillStyle=g;nctx.fillRect(0,0,52,52);
  drawBall(nctx,26,26,nxt,1,0);
}

function ltn(hex,a){
  const n=parseInt(hex.slice(1),16);
  return`rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&255)+a)},${Math.min(255,(n&255)+a)})`;
}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

/* ══ DANGER CHECK ═══════════════════════════════════════════ */
function checkDanger(){
  if(gameOver)return;
  for(const b of Composite.allBodies(wd)){
    if(b.label!=='ball')continue;
    if(Date.now()-b.spawnTime<2200)continue;
    if(b.position.y-BC[b.bL-1].r<DANGER){
      b._dm=(b._dm||0)+16;if(b._dm>1500){doGameOver();return;}
    } else b._dm=Math.max(0,(b._dm||0)-12);
  }
}
function doGameOver(){
  gameOver=true;sfx.gameOver();
  submitScore(score);
  document.getElementById('over-sc').textContent='Score: '+score.toLocaleString();
  document.getElementById('over').style.display='flex';
}
function restart(){
  World.clear(wd);Engine.clear(eng);initPhy();
  score=0;nxt=rndN();gameOver=false;locked=false;parts=[];merges=[];mergeIds=new Set();
  document.getElementById('sv').textContent='0';
  document.getElementById('over').style.display='none';
  drawNext();
}

  el.textContent=txt;el.className='';void el.offsetWidth;el.className='popping';
}

}

function dropSpikes(){
  World.add(wd,Bodies.circle(Math.random()*(CW-80)+40,40,18,{label:'spike',restitution:.5,friction:.1}));
  sfx.spikeSpawn();
}


/* ══ TIKTOK WEBSOCKET ═══════════════════════════════════════ */
let ttStatus='disconnected', ttUser='', ttIsLive=false;
let ws=null, wsReconnectTimer=null;
const seenMsgIds=new Set();
function isDupe(m){
  if(!m.msgId)return false;
  if(seenMsgIds.has(m.msgId))return true;
  seenMsgIds.add(m.msgId);
  if(seenMsgIds.size>200)seenMsgIds.delete(seenMsgIds.values().next().value);
  return false;
}
function initWS(){
  if(ws&&(ws.readyState===WebSocket.OPEN||ws.readyState===WebSocket.CONNECTING))return;
  clearTimeout(wsReconnectTimer);
  if(!authToken)return;
  try{
    const proto=location.protocol==='https:'?'wss':'ws';
    ws=new WebSocket(`${proto}://${location.host}?token=${authToken}`);
    ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(isDupe(m))return;
      if(m.type==='status'){
        ttStatus=m.status;ttUser=m.username||'';
        if(!m.isLive) ttIsLive=false;
        updateTTUI();
      }
      if(m.type==='gift'){
        ttIsLive=true;updateTTUI();
        dropSpikes();
      }
      if(m.type==='follow'){
        ttIsLive=true;updateTTUI();
        spawnBall(clamp(CW/2+(Math.random()*80-40),40,CW-40),DROPY,1,false);
      }
      if(m.type==='chat'){
        ttIsLive=true;updateTTUI();
        if((m.comment||'').trim()==='!drop')
          spawnBall(clamp(CW/2+(Math.random()*80-40),40,CW-40),DROPY,1,false);
      }
    };
    ws.onclose=e=>{
      ws=null;
      if(e.code===4001||e.code===4003){logout();return;}
      wsReconnectTimer=setTimeout(initWS,3000);
    };
    ws.onerror=()=>{};
  }catch(e){}
}
function updateTTUI(){
  document.querySelectorAll('[id$="-ttdot"]').forEach(dot=>{
    dot.style.background=ttIsLive?'#2ecc71':ttStatus==='connecting'?'#FFB347':'#ccc';
    dot.style.boxShadow=ttIsLive?'0 0 8px #2ecc71aa':ttStatus==='connecting'?'0 0 6px #FFB347aa':'none';
  });
  document.querySelectorAll('[id$="-ttlbl"]').forEach(lbl=>{
    lbl.textContent=ttIsLive?`LIVE — @${ttUser}`:ttStatus==='connecting'?'Connecting…':'Not live — retrying…';
    lbl.style.color=ttIsLive?'#2ecc71':ttStatus==='connecting'?'#FFB347':'#aaa';
  });
}

/* ══ MOBILE SHEET ═══════════════════════════════════════════ */
function openSheet(){
  buildMod(document.getElementById('mob-mod'));
  document.getElementById('mob-bg').classList.add('open');
}
function closeBg(e){if(e.target===document.getElementById('mob-bg'))document.getElementById('mob-bg').classList.remove('open');}

/* ══ INPUT ══════════════════════════════════════════════════ */
function cvX(cx){const r=cv.getBoundingClientRect();return(cx-r.left)*(CW/r.width);}
cv.addEventListener('mousemove',e=>{mx=cvX(e.clientX);});
cv.addEventListener('click',dropBall);
cv.addEventListener('touchmove',e=>{e.preventDefault();mx=cvX(e.touches[0].clientX);},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();mx=cvX(e.changedTouches[0].clientX);dropBall();},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowDown'){e.preventDefault();dropBall();}
  if(e.code==='ArrowLeft')mx=Math.max(24,mx-14);
  if(e.code==='ArrowRight')mx=Math.min(CW-24,mx+14);
});

/* ══ CLOUDS ═════════════════════════════════════════════════ */
function makeClouds(){
  const bg=document.getElementById('bg');
  [[200,44,55,18,'27s'],[145,34,130,11,'20s'],[255,52,205,23,'34s'],[175,38,310,14,'23s']].forEach(([w,h,top,delay,dur])=>{
    const c=document.createElement('div');c.className='cloud';
    c.style.cssText=`width:${w}px;height:${h}px;top:${top}px;left:-${w+20}px;animation-duration:${dur};animation-delay:-${delay}s`;
    const p=document.createElement('div');p.className='cpuff';
    p.style.cssText=`width:${w*.55}px;height:${h*1.5}px;top:-${h*.52}px;left:${w*.2}px`;
    c.appendChild(p);bg.appendChild(c);
  });
}

/* ══ MAIN LOOP ══════════════════════════════════════════════ */
function loop(){
  if(!gameOver){
    doMerges();Engine.update(eng,1000/60);stepParts();checkDanger();
    if(shk>0){
      const w=document.getElementById('cv-wrap');
      w.style.transform=`translate(${(Math.random()-.5)*5}px,${(Math.random()-.5)*5}px)`;
      shk--;if(shk===0)w.style.transform='';
    }
  }
  render();requestAnimationFrame(loop);
}

/* ══ BOOT ═══════════════════════════════════════════════════ */
makeClouds();initPhy();
window.addEventListener('resize',sizeCanvas);

function startGame(){
  initWS();
  api('/api/data').then(r=>r.json()).then(data=>{
    clientStore=data;
    api('/api/score').then(r=>r.json()).then(d=>{
      if(d.best && d.best > hi){ hi=d.best; localStorage.setItem('mb_hi',hi); }
      document.getElementById('bv').textContent=hi.toLocaleString();
    }).catch(()=>{});
    document.fonts.ready.then(()=>{
      sizeCanvas();drawNext();
      buildMod(document.getElementById('desk-mod'));
      document.getElementById('bv').textContent=hi.toLocaleString();
      requestAnimationFrame(loop);
      if(data.ttUsername) autoConnectTT(data.ttUsername);
    });
  }).catch(()=>logout());
}

function autoConnectTT(username){
  const tryConnect=()=>{
    api('/api/connect',{method:'POST',body:JSON.stringify({username})})
      .then(r=>r.json()).catch(()=>{});
  };
  tryConnect();
  clearInterval(autoConnectTT._timer);
  autoConnectTT._timer=setInterval(()=>{
    if(ttIsLive){clearInterval(autoConnectTT._timer);return;} // stop once confirmed live
    tryConnect();
  },60000);
}

loadLeaderboard();

if(authToken){
  api('/api/data').then(r=>{
    if(r.status===401||r.status===403){logout();return;}
    return r.json();
  }).then(data=>{
    if(!data)return;
    document.getElementById('login-screen').style.display='none';
    startGame();
  }).catch(()=>logout());
}
